methodology_summary: >
  Multi-signal scoring pipeline with 4 independent pillars:
  (1) Role Fit — career trajectory, industry type, domain signals extracted from
  job descriptions using keyword matching against IR/ranking-specific terms;
  (2) Skill Match — JD-weighted scoring of must-have vs nice-to-have skills,
  modulated by proficiency level, endorsements, duration of use, and assessment scores;
  (3) Behavioral Signals — recency, recruiter response rate, open-to-work status,
  notice period, location fit, GitHub activity, and interview completion rate;
  (4) Experience Quality — YOE band fit, product vs services company ratio,
  tenure stability (anti-title-chasing), and education tier.
  Honeypots detected via impossible timeline checks and 0-duration expert skill anomalies.
  Final score = weighted combination (35/30/20/15). All CPU, no API calls, ~2 min.
